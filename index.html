<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tap Tap</title>
    <!-- website : icon -->
    <!-- <link rel="shortcut icon" type="x-icon" href="icon.png"> -->
    <!-- cdn : tailwind -->
    <script src="js/tailwind.js"></script>
    <style>
        @font-face {
            font-family: 'Digital';

        }
    </style>
</head>
<body>

    <!-- section : from -->
    <section>
        <form>
            <label>Masukan Nama</label>
            <input type="text">

            <label>
                Masukan Gugus
                <input type="text">
            </label>

            <button type="submit">Kirim</button>
        </form>
    </section>
    
    <!-- section : menu -->
    <section>
        <p>Wercome [Username] </p>
        
        <button>Play Game</button>
        
        <!-- akan muncul saat game selesai -->
        <button>Score Board</button> 
    </section>

    <!-- section : start game  -->
    <section class="bg-blue-100">
        <p class="text-2xl font-[]">timer</p>
        
        <div class="btn-content">
            <button class="red-3d-button">Press Me</button>
        </div>
    
        <div class="pop-up">
            <p>Game selesai</p>
        </div>
    </section>
    
    <!-- section : finis  -->
    <section>
        <p>congraturation [username]</p>
        <p>point: [point]</p>
        <button>Play Again</button>
        <button>Score Board</button>
    </section>

    <!-- section : papan score  -->
    <section class="bg-cyan-100">
        <p>Score Board</p>
        <table>
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Gugus</th>
                    <th>Point</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Nexdy Experiment</td>
                    <td>Gugus Depan</td>
                    <td>100</td>
                </tr>
                <tr>
                    <td>Nexdy Experiment</td>
                    <td>Gugus Depan</td>
                    <td>200</td>
                </tr>
            </tbody>
        </table>
    </section>

    <!-- script js --> 
    <script src="js/script.js"></script>
</body>
</html>
