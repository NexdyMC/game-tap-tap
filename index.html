<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tap Tap</title>
    <!-- website : icon -->
    <!-- <link rel="shortcut icon" type="x-icon" href="icon.png"> -->
    <!-- cdn : tailwind -->
    <script src="js/tailwind.js"></script>
    <style>
        @font-face {
            font-family: 'Digital';
            src: url('font/digital-7.ttf') format('truetype');
        }
.btn-3d {
    padding: 16px 32px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.05s, box-shadow 0.05s;
    position: relative;
    outline: none;
}
.btn-green {
    background-color: #27ae60;
    color: white;
    box-shadow: 0 6px 0 #1e8449;
}

.input-3d, .select-3d {
    padding: 12px 16px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    background-color: #f0f0f0;
    box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.2);
    transition: all 0.3s ease;
    outline: none;
    width: 100%;
    box-sizing: border-box;
}

.input-3d:focus, .select-3d:focus {
    background-color: #ffffff;
    box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3), 0 0 5px rgba(52, 152, 219, 0.5);
}

.select-3d {
    appearance: none; 
    cursor: pointer;
    background-image: url('data:image/svg+xml;utf8,<svg fill="black" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
    background-repeat: no-repeat;
    background-position: right 10px center;
}

    </style>
</head>
<body class="bg-blue-800 flex justify-center items-center">

    <!-- section : from -->
    
    <main class="max-w-[480px] w-full min-width-[100px] h-screen bg-blue-100">
        <section class="w-full h-screen bg-blue-200 flex flex-col justify-center items-center">
            <p class="text-2xl font-bold">Title Game</p>
            
            <!-- form input -->
            <main class="grid border-2 border-blue-400 p-4 gap-4 w-full max-w-[300px]">
                <label for="username">Masukan Nama</label>
                <input type="text" class="input-3d" id="username">
    
                <label for="gugus">Masukan Gugus</label>
                <input type="text" class="input-3d" id="gugus">
    
                <button class="btn-3d btn-green">Klik Saya</button>
            </main>
        </section>
    </main>

    <!-- script js --> 
    <script src="js/script.js"></script>
</body>
</html>
