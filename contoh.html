<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sci-Fi Game UI</title>
  <!-- Mengambil font futuristik dari Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    /* 1. Pengaturan Latar Belakang Game */
    body {
      background-color: #0b0f19; /* Biru sangat gelap khas teknologi */
      color: #00ffcc; /* Teks hijau/biru neon */
      font-family: 'Orbitron', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    /* 2. Panel Kontainer (Tempat Form & Tombol) */
    .game-panel {
      background: rgba(16, 24, 48, 0.85); /* Transparan gelap */
      border: 2px solid #00ffcc;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.3), inset 0 0 15px rgba(0, 255, 204, 0.2);
      text-align: center;
      width: 350px;
    }

    h2 {
      margin-bottom: 30px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #00ffcc;
    }

    /* 3. Gaya Form Input (Nama & Gugus) */
    .input-group {
      margin-bottom: 25px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 12px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 15px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #00a3ff; /* Border biru cyan */
      border-radius: 6px;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    /* Efek saat input diklik/fokus */
    input[type="text"]:focus {
      outline: none;
      border-color: #00ffcc;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
    }

    /* 4. Tombol 3D Gaya Neon / Techno */
    .btn-cyber {
      position: relative;
      background: linear-gradient(135deg, #0055ff, #00a3ff);
      color: #ffffff;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      font-family: 'Orbitron', sans-serif;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      
      /* Efek 3D Tebal di Bawah Tombol */
      box-shadow: 0 6px 0 #0033aa, 0 12px 20px rgba(0, 85, 255, 0.4);
      transition: all 0.1s ease;
    }

    /* Efek Hover (Saat Kursor di Atas Tombol) */
    .btn-cyber:hover {
      background: linear-gradient(135deg, #0066ff, #00bfff);
      box-shadow: 0 6px 0 #0044cc, 0 12px 25px rgba(0, 255, 204, 0.5);
    }

    /* Efek Active (Saat Tombol Diklik / Ditekan Masuk) */
    .btn-cyber:active {
      box-shadow: 0 2px 0 #0033aa, 0 4px 10px rgba(0, 85, 255, 0.4);
      transform: translateY(4px); /* Tombol turun seolah-olah ambles ke dalam */
    }
  </style>
</head>
<body>

  <!-- Struktur Panel Game -->
  <div class="game-panel">
    <h2>SYSTEM LOGIN</h2>
    
    <!-- Input Nama -->
    <div class="input-group">
      <label for="nama">Nama Player</label>
      <input type="text" id="nama" placeholder="Masukkan nama..." autocomplete="off">
    </div>
    
    <!-- Input Gugus -->
    <div class="input-group">
      <label for="gugus">Gugus / Tim</label>
      <input type="text" id="gugus" placeholder="Contoh: Gugus 01..." autocomplete="off">
    </div>
    
    <!-- Tombol Masuk Game -->
    <button class="btn-cyber">START GAME</button>
  </div>

</body>
</html>
