<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Hero Header</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-0: #050c18;
            --bg-1: #0a1830;
            --node: #5fd4ff;
            --node-core: #bff2ff;
            --line: 56, 180, 255;
            --red: #e14b4b;
            --red-soft: #a83244;
            --text: #eaf3fb;
            --muted: #8ea3bd;
            --accent: #5fd4ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            background: var(--bg-0);
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background:
                radial-gradient(ellipse 80% 60% at 30% 20%, #0d2440 0%, transparent 60%),
                radial-gradient(ellipse 70% 50% at 80% 70%, #0a1c33 0%, transparent 60%),
                linear-gradient(160deg, var(--bg-0) 0%, var(--bg-1) 55%, var(--bg-0) 100%);
            overflow: hidden;
        }

        canvas#net {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* bokeh lampu merah/biru buram */
        .bokeh {
            position: absolute;
            border-radius: 50%;
            filter: blur(18px);
            pointer-events: none;
            mix-blend-mode: screen;
            animation: drift 14s ease-in-out infinite;
        }

        @keyframes drift {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(12px, -16px) scale(1.08);
            }
        }

        /* garis gelombang halus di background */
        .waves {
            position: absolute;
            inset: 0;
            opacity: .35;
            pointer-events: none;
        }



        @media (max-width:760px) {
            nav.links {
                display: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .bokeh {
                animation: none;
            }
        }
    </style>
</head>

<body>

    <section class="hero" id="hero">
        <canvas id="net"></canvas>
        <!-- <svg class="waves" viewBox="0 0 1200 700" preserveAspectRatio="none">
            <path d="M0,420 C250,360 400,470 650,400 C850,345 1000,430 1200,380" stroke="#5fd4ff" stroke-width="1"
                fill="none" opacity="0.25" />
            <path d="M0,470 C260,430 420,520 680,460 C880,410 1030,480 1200,440" stroke="#5fd4ff" stroke-width="1"
                fill="none" opacity="0.15" />
        </svg> -->

        <div class="bokeh"
            style="width:140px;height:140px; left:6%; top:32%; background:radial-gradient(circle,var(--red) 0%, transparent 70%); animation-delay:0s;">
        </div>
        <div class="bokeh"
            style="width:90px;height:90px; left:14%; top:58%; background:radial-gradient(circle,var(--red-soft) 0%, transparent 70%); animation-delay:2s;">
        </div>
        <div class="bokeh"
            style="width:110px;height:110px; right:10%; top:20%; background:radial-gradient(circle,var(--red) 0%, transparent 70%); animation-delay:4s;">
        </div>
        <div class="bokeh"
            style="width:70px;height:70px; right:22%; bottom:14%; background:radial-gradient(circle,var(--red-soft) 0%, transparent 70%); animation-delay:1s;">
        </div>
        <div class="bokeh"
            style="width:160px;height:160px; left:42%; bottom:6%; background:radial-gradient(circle,var(--node) 0%, transparent 72%); opacity:.4; animation-delay:3s;">
        </div>
    </section>

    <script>
        (function () {
            const canvas = document.getElementById('net');
            const ctx = canvas.getContext('2d');
            const hero = document.getElementById('hero');
            let W, H, DPR;
            let points = [];
            let mouse = {
                x: null,
                y: null
            };

            const LINK_DIST = 170;
            const MOUSE_DIST = 200;

            function resize() {
                W = hero.clientWidth;
                H = hero.clientHeight;
                DPR = Math.min(window.devicePixelRatio || 1, 2);
                canvas.width = W * DPR;
                canvas.height = H * DPR;
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
                initPoints();
            }

            function initPoints() {
                const count = Math.max(28, Math.round((W * H) / 26000));
                points = [];
                for (let i = 0; i < count; i++) {
                    points.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        vx: (Math.random() - 0.5) * 0.22,
                        vy: (Math.random() - 0.5) * 0.22,
                        r: Math.random() * 1.6 + 1.1
                    });
                }
            }

            function step() {
                ctx.clearRect(0, 0, W, H);

                // update
                for (const p of points) {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < -20) p.x = W + 20;
                    if (p.x > W + 20) p.x = -20;
                    if (p.y < -20) p.y = H + 20;
                    if (p.y > H + 20) p.y = -20;
                }

                // links
                for (let i = 0; i < points.length; i++) {
                    for (let j = i + 1; j < points.length; j++) {
                        const a = points[i],
                            b = points[j];
                        const dx = a.x - b.x,
                            dy = a.y - b.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < LINK_DIST) {
                            const alpha = (1 - dist / LINK_DIST) * 0.55;
                            ctx.strokeStyle =
                                `rgba(${getComputedStyle(document.documentElement).getPropertyValue('--line').trim()}, ${alpha})`;
                            ctx.lineWidth = 0.7;
                            ctx.beginPath();
                            ctx.moveTo(a.x, a.y);
                            ctx.lineTo(b.x, b.y);
                            ctx.stroke();
                        }
                    }
                    // link to mouse
                    if (mouse.x !== null) {
                        const dx = points[i].x - mouse.x,
                            dy = points[i].y - mouse.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < MOUSE_DIST) {
                            const alpha = (1 - dist / MOUSE_DIST) * 0.5;
                            ctx.strokeStyle = `rgba(191,242,255, ${alpha})`;
                            ctx.lineWidth = 0.8;
                            ctx.beginPath();
                            ctx.moveTo(points[i].x, points[i].y);
                            ctx.lineTo(mouse.x, mouse.y);
                            ctx.stroke();
                        }
                    }
                }

                // nodes
                for (const p of points) {
                    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 5);
                    grad.addColorStop(0, 'rgba(191,242,255,0.9)');
                    grad.addColorStop(1, 'rgba(95,212,255,0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r * 5, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#dff6ff';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fill();
                }

                requestAnimationFrame(step);
            }

            window.addEventListener('resize', resize);
            hero.addEventListener('mousemove', (e) => {
                const rect = hero.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
            });
            hero.addEventListener('mouseleave', () => {
                mouse.x = null;
                mouse.y = null;
            });

            resize();
            requestAnimationFrame(step);
        })();
    </script>

</body>

</html>
