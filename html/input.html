    <style>
.btn-3d {
  padding: 16px 32px;
  font-size: 18px;
  font-weight: bold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.05s, box-shadow 0.05s;
  /* Properti penting untuk posisi */
  position: relative;
  outline: none;
}

/* 1. Warna Biru */
.btn-blue {
  background-color: #3498db;
  color: white;
  box-shadow: 0 6px 0 #2471a3;
}

/* 2. Warna Hijau */
.btn-green {
  background-color: #27ae60;
  color: white;
  box-shadow: 0 6px 0 #1e8449;
}

/* 3. Warna Merah */
.btn-red {
  background-color: #e74c3c;
  color: white;
  box-shadow: 0 6px 0 #c0392b;
}

/* Efek saat tombol ditekan (Active) */
.btn-3d:active {
  transform: translateY(4px); /* Tombol bergerak ke bawah */
  box-shadow: 0 2px 0;        /* Shadow menipis saat tombol tertekan */
}

/* Gaya dasar untuk semua elemen form */
.input-3d, .select-3d {
  padding: 12px 16px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background-color: #f0f0f0; /* Warna latar belakang cerah */
  
  /* Efek 3D: Bayangan ke dalam (inset) */
  box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.2);
  
  /* Transisi halus */
  transition: all 0.3s ease;
  outline: none;
  width: 100%;
  box-sizing: border-box;
}

/* Efek saat Input/Select diklik (Focus) */
.input-3d:focus, .select-3d:focus {
  background-color: #ffffff;
  /* Bayangan berubah sedikit untuk memberi kesan "muncul" atau "aktif" */
  box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3), 0 0 5px rgba(52, 152, 219, 0.5);
}

/* Khusus untuk Select agar terlihat seragam */
.select-3d {
  appearance: none; /* Menghilangkan panah default browser */
  cursor: pointer;
  background-image: url('data:image/svg+xml;utf8,<svg fill="black" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
  background-repeat: no-repeat;
  background-position: right 10px center;
}
    </style>
</head>
<body>
    <button class="btn-3d btn-blue">Klik Saya</button>
    <button class="btn-3d btn-green">Klik Saya</button>
    <button class="btn-3d btn-red">Klik Saya</button>
    <input type="text" class="input-3d" placeholder="Masukkan teks...">
</body>
