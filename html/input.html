<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Input</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
     <style>
body{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #e5e5e5;
    font-family: Arial, sans-serif;
}

.input-3d{
    width: 300px;
    padding: 15px 20px;
    font-size: 16px;

    border: none;
    outline: none;
    border-radius: 12px;

    background: #f5f5f5;

    /* 3D Effect */
    box-shadow:
        6px 6px 12px rgba(0,0,0,0.2),
        -6px -6px 12px rgba(255,255,255,0.8);

    transition: all 0.3s ease;
}

.input-3d:focus{
    transform: translateY(2px);

    box-shadow:
        inset 4px 4px 8px rgba(0,0,0,0.15),
        inset -4px -4px 8px rgba(255,255,255,0.8);
}
     </style>
</head>
<body>

    <input type="text" class="input-3d" placeholder="Enter your name">

</body>
</html>
