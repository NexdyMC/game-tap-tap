<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

    body {
        background-color: #362F4F;
        display: flex;
        justify-content: center;
        height: 90vh;
        align-items: center;
    }

    .container {
        display: grid;
        justify-content: center;
        align-items: center;
        border: 1px solid white;
        width: 700px;
    }

    .name-leaderboard {
        color: white;
        font-weight: bold;
        font-size: 35px;
        font-family: sans-serif;
        text-align: center;
    }

    .papan {
        display: flex;
        justify-content: center;

        /* TABLE */
    }
    table, th, td {
       border: 1px solid white;
       color: white;
       font-family: sans-serif;
       border-collapse: collapse;
       padding: 15px;
       width: 100%;
    }

    th {
        width: 250px;
    }

    .name-game {
        display: flex;
        justify-content: center;
        color: white;
        font-family: sans-serif;
        padding-bottom: 20px;
    }
</style>
<body>
    <div class="container">
        <div class="name-leaderboard">Leaderboard</div>
        <div class="name-game">Tap - Tap Game</div>


        <div class="papan">
            <table>
                <tr>
                    <th>Peringkat</th>
                    <th>Nama</th>
                    <th>Gugus</th>
                    <th>Skor</th>
                </tr>
                 <tr>
                    <th>1</th>
                    <th>Adit</th>
                    <th>PHP</th>
                    <th>100</th>
                 </tr>
            </table>
        </div>
        </div>
</body>
</html>
