
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tap Tap</title>
    <!-- website : icon -->
    <!-- <link rel="shortcut icon" type="x-icon" href="icon.png"> -->
    <!-- cdn : tailwind -->
    <script src="../js/tailwind.js"></script>
    <link rel="stylesheet" href="../style/style.css">
    <style>
    .btn-container {
        background: repeating-linear-gradient(
            45deg,
            #ffcc00,
            #ffcc00 20px,
            #000 20px,
            #444 40px
        );
        padding: 15px;
        
        border-radius: 1rem;
        display: inline-block;
        box-shadow: 0 12px 0 #111;
    }
    
    </style>
</head>
<body>

    <!-- btn : lingkarang -->
    <div class="btn-container">
        <div class="btn-content">
            <button class="red-3d-button">Press Me</button>
        </div>
    </div>
    
    <!-- btn : kotak -->
    <div class="btn-box">
        <button class="red-box-button">Press Me</button>
    </div>
    
    <!-- script js --> 
    <script src="../js/script.js"></script>
</body>
</html>
